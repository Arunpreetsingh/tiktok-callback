<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>TikTok Auth Callback</title>
  <style>
    body { font-family: sans-serif; max-width: 700px; margin: 60px auto; padding: 20px; }
    h2   { color: #333; }
    .box {
      background: #f4f4f4;
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 16px;
      word-break: break-all;
      font-family: monospace;
      font-size: 14px;
    }
    .btn {
      margin-top: 16px;
      padding: 10px 20px;
      background: #fe2c55;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 15px;
    }
    .btn:hover { background: #d4002a; }
    .success { color: green; font-weight: bold; margin-top: 10px; }
  </style>
</head>
<body>
  <h2>TikTok Authorization</h2>
  <p id="status">Reading authorization code…</p>

  <div id="url-box" style="display:none">
    <p><strong>Copy this full URL and paste it into your terminal:</strong></p>
    <div class="box" id="full-url"></div>
    <button class="btn" onclick="copyUrl()">Copy URL</button>
    <p class="success" id="copied" style="display:none">Copied to clipboard!</p>
  </div>

  <script>
    const fullUrl = window.location.href;
    const params  = new URLSearchParams(window.location.search);
    const code    = params.get('code');
    const error   = params.get('error');

    if (error) {
      document.getElementById('status').textContent =
        'Authorization failed: ' + error;
    } else if (code) {
      document.getElementById('status').textContent =
        'Authorization successful! Copy the URL below and paste it into your terminal.';
      document.getElementById('full-url').textContent = fullUrl;
      document.getElementById('url-box').style.display = 'block';
    } else {
      document.getElementById('status').textContent =
        'No authorization code found. Make sure you arrived here via TikTok login.';
    }

    function copyUrl() {
      navigator.clipboard.writeText(fullUrl).then(() => {
        document.getElementById('copied').style.display = 'block';
      });
    }
  </script>
</body>
</html>
